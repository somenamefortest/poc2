name: Deploy React App
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Run TruffleHog
      uses: trufflesecurity/trufflehog@main
      continue-on-error: true
      with:
        path: ./
        base: ""
        head: ${{ github.ref_name }}
        extra_args: --results=verified,unverified,unknown --json
  upload-results:
    needs: secret-scanning 
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Load TruffleHog Logs
        run: |
          gh run view ${{ github.run_id }} --log | grep '^{' > results.json
          curl -X POST "https://demo.defectdojo.org" \
          -H "Authorization: Token ${{ secrets.DD_TOKEN }}" \
          -F "scan_type=Trufflehog Scan" \
          -F "product_name=cicdpoc" \
          -F "file=@results.json"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-and-deploy:
    needs: secret-scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
  

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
