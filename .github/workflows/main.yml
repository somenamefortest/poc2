name: Deploy React App
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Run TruffleHog
      id: trufflehog
      uses: trufflesecurity/trufflehog@main
      continue-on-error: true
      with:
        path: ./
        base: ""
        head: ${{ github.ref_name }}
        extra_args: --results=verified,unverified,unknown --json
    - name: Create finding in DefectDojo
      if: steps.trufflehog.outcome == 'failure'
      run: |
        echo ${{ secrets.DD_TOKEN }}
        curl -X POST "https://demo.defectdojo.org/api/v2/findings/" \
        -H "Authorization: ${{ secrets.DD_TOKEN }}" \
        -H "Content-Type: application/json" \
        -d @- <<EOF
        {
          "title": "Secrets identified in ${{ github.event.repository.name }}",
          "description": "TruffleHog detected potential secrets in the latest push to the ${{ github.ref_name }} branch. Manual review is required immediately.",
          "severity": "Critical",
          "active": true,
          "verified": false,
          "numerical_severity": "S0",
          "product": 5, 
          "engagement": 1
        }
        EOF
  build-and-deploy:
    needs: secret-scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
  

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
